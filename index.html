<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiaoAI - AI工具导航平台</title>
  <meta name="description" content="发现最实用的AI工具，AI聊天、AI绘画、AI视频、AI编程一站式导航">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="妙AI">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>
<body>
  <div class="bg-animation"></div>

  <header class="header-glass">
    <div class="header-inner">
      <div class="logo" onclick="resetView()">
        <img src="/logo.png" alt="妙AI.中国" class="logo-img">
      </div>
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" class="search-input" placeholder="搜索AI工具..." autocomplete="off">
        <div id="searchDropdown" class="search-dropdown hidden"></div>
      </div>

    </div>
  </header>

  <div class="main-content">
    <!-- Category Sidebar (desktop) / Tab bar (mobile) -->
    <nav class="category-bar" id="categoryBar"></nav>

    <!-- Main Grid -->
    <main class="content-area">
      <section id="toolGrid" class="tool-grid"></section>
      <div id="noResults" class="no-results hidden">
        <div class="no-results-icon">🔍</div>
        <p>没有找到匹配的工具</p>
      </div>
    </main>
  </div>

  <!-- Mobile Bottom Nav -->
  <nav class="bottom-nav" id="bottomNav"></nav>

  <footer class="footer">
    <div class="footer-inner">
      <p><img src="/logo.png" alt="妙AI.中国" style="height:18px;vertical-align:middle;border-radius:4px;"> 妙AI.中国 — 发现最实用的AI工具</p>
      <p class="footer-sub">收录优质AI工具，助力效率提升</p>
    </div>
  </footer>

  <script src="/app.js"></script>
  <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js')}</script>
</body>
</html>
