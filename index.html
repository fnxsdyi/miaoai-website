<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiaoAI - AI工具导航平台</title>
  <meta name="description" content="发现最实用的AI工具，AI聊天、AI绘画、AI视频、AI编程一站式导航">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="妙AI">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>
<body>
  <div class="bg-animation"></div>

  <header class="header-glass">
    <div class="header-inner">
      <div class="logo" onclick="resetView()">
        <img src="/logo.png" alt="妙AI.中国" class="logo-img">
      </div>
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" class="search-input" placeholder="搜索AI工具..." autocomplete="off">
        <div id="searchDropdown" class="search-dropdown hidden"></div>
      </div>
      <a class="github-link" href="https://github.com/fnxsdyi/miaoai-website" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
      </a>
    </div>
  </header>

  <div class="main-content">
    <!-- Category Sidebar (desktop) / Tab bar (mobile) -->
    <nav class="category-bar" id="categoryBar"></nav>

    <!-- Main Grid -->
    <main class="content-area">
      <section id="toolGrid" class="tool-grid"></section>
      <div id="noResults" class="no-results hidden">
        <div class="no-results-icon">🔍</div>
        <p>没有找到匹配的工具</p>
      </div>
    </main>
  </div>

  <!-- Mobile Bottom Nav -->
  <nav class="bottom-nav" id="bottomNav"></nav>

  <footer class="footer">
    <div class="footer-inner">
      <p><img src="/logo.png" alt="妙AI.中国" style="height:18px;vertical-align:middle;border-radius:4px;"> 妙AI.中国 — 发现最实用的AI工具</p>
      <p class="footer-sub">收录优质AI工具，助力效率提升</p>
    </div>
  </footer>

  <script src="/app.js"></script>
  <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js')}</script>
</body>
</html>
