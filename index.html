  <script>
  function toggleDark(){
    var body=document.body;
    var isDark=body.classList.toggle('dark');
    localStorage.setItem('dark',isDark?'1':'0');
    document.getElementById('iconMoon').style.display=isDark?'none':'block';
    document.getElementById('iconSun').style.display=isDark?'block':'none';
  }
  // 启动时同步图标状态
  if(localStorage.getItem('dark')==='1'){
    document.getElementById('iconMoon').style.display='none';
    document.getElementById('iconSun').style.display='block';
  }
  function shareOrFav(){
    if(navigator.share && navigator.canShare && navigator.canShare({url:window.location.href})){
      navigator.share({title:'妙AI.中国 - AI工具导航平台',url:window.location.href}).catch(function(){})
    }else{
      var url=window.location.href,title='妙AI.中国';
      if(window.external&&'addFavorite' in window.external){try{window.external.addFavorite(url,title);return}catch(e){}}
      if(window.sidebar){try{window.sidebar.addPanel(title,url,'');return}catch(e){}}
      prompt('请按 Ctrl+D（Mac按 Cmd+D）收藏本站，或复制链接：',url)
    }
  }
